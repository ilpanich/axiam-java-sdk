spring.application.name=axiam-sdk-example-spring-boot-app

# AXIAM server this example authenticates against — override for your
# environment. SecurityConfig requires both properties to construct the
# JwksVerifier/AxiamAuthenticationFilter beans (no silent default tenant,
# CONTRACT.md §5).
axiam.base-url=https://localhost:8443
axiam.tenant-id=example-tenant
